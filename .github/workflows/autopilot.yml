name: Autopilot

# Researches, writes, and publishes one article every day.
# Requires DEEPSEEK_API_KEY and TAVILY_API_KEY in repo
# Settings → Secrets and variables → Actions.

on:
  schedule:
    # Daily at 14:00 UTC (8 AM CST / 9 AM CDT — early morning in Jackson)
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run autopilot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: node scripts/autopilot.mjs
