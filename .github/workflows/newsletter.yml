name: Newsletter

# Sends the daily Jackson Wire digest to Resend subscribers, for any
# articles published today. Runs after autopilot, morning brief, and social
# posting so the day's stories are already live. Stateless: no commit step.
#
# Requires RESEND_API_KEY and RESEND_AUDIENCE_ID in repo Settings → Secrets
# and variables → Actions. See docs/NEWSLETTER-SETUP.md.

on:
  schedule:
    # Daily at 16:00 UTC (11 AM CDT / 10 AM CST).
    - cron: "0 16 * * *"
  workflow_dispatch: {}

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: node scripts/send-newsletter.mjs
