name: Morning Brief

# Produces the daily Morning Brief — a 5-item summary of what Jackson needs
# to know this morning. Lands before commute time, Central.
#
# Requires ANTHROPIC_API_KEY in repo Settings → Secrets and variables → Actions.
# Optional: COURTLISTENER_API_TOKEN raises CourtListener rate limits.

on:
  schedule:
    # Daily at 11:00 UTC (6 AM CDT / 5 AM CST — pre-commute in Jackson).
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: node scripts/morning-brief.mjs
